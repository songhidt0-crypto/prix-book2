name: prix_book
description: Wholesale Price Comparison App for Algerian stationery shop owners.
publish_to: 'none'
version: 1.2.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.1

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Fonts
  google_fonts: ^6.2.1

  # UI
  flutter_slidable: ^3.1.0

  # Utils
  url_launcher: ^6.2.6
  intl: ^0.19.0
  equatable: ^2.0.5

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.3

  # Share / Export
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
